name: Build And Push Items Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            trel0w/shopping-items-service:latest
            trel0w/shopping-items-service:sha-${{ github.sha }}

      - name: Trigger centralized swarm deploy
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.INFRA_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/shopping-list-cloud-native/shopping-infra-deployment/dispatches \
            -d '{"event_type":"trigger-swarm-deploy","client_payload":{"source_repo":"shopping-items-service","sha":"${{ github.sha }}"}}'
